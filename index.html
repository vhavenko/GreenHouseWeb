<!DOCTYPE html>

<html>

<head>

<meta charset="utf-8">

<title>Теплиці</title>

<style>

body{

  font-family:Arial;

  background:#111;

  color:white;

}

.card{

  background:#222;

  margin:10px;

  padding:15px;

  border-radius:10px;

}

.temp{

  font-size:32px;

}

</style>

</head>

<body>

<h1>🌱 Теплиці</h1>

<div id="content"></div>

<script>

const API =

'https://script.google.com/macros/s/AKfycbx_OBJe-acAUBDBZmw8Jyan8WvXBLqF8weGtIuogAkEGW4VL75QNM4Ui6-ef5LTrrTvJA/exec';

async function loadData(){

  const r = await fetch(API);

  const data = await r.json();

  let html='';

  data.greenhouses.forEach(g=>{

    html += `

      <div class="card">

        <h2>Теплиця ${g.number}</h2>

        <div class="temp">${g.value} °C</div>

      </div>

    `;

  });

  document.getElementById('content').innerHTML = html;

}

loadData();

setInterval(loadData,60000);

</script>

</body>

</html>
