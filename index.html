<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenHouseWeb</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #101820;
      color: white;
      margin: 0;
      padding: 20px;
    }
    h1 { text-align: center; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 15px;
      max-width: 700px;
      margin: 20px auto;
    }
    .card {
      background: #1f2933;
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 0 10px #0005;
    }
    .num { font-size: 18px; opacity: 0.8; }
    .temp { font-size: 36px; font-weight: bold; margin-top: 10px; }
    .status { text-align: center; margin-top: 20px; opacity: 0.7; }
  </style>
</head>
<body>

  <h1>Теплиці</h1>

  <div class="grid" id="greenhouses"></div>
  <div class="status" id="status">Завантаження...</div>

  <script>
    const API_URL = ʼhttps://script.google.com/macros/s/AKfycbzpUmmqdp3LVS0qIqzmL3VKj26tWb8HywI2kAhLxXwau4eRtHay1rfvR1ZpUYAkJPTDbg/exec';

    async function loadData() {
      const box = document.getElementById('greenhouses');
      const status = document.getElementById('status');

      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        box.innerHTML = '';

        data.forEach(item => {
          const temp = Number(item.temp);
          box.innerHTML += `
            <div class="card">
              <div class="num">Теплиця ${item.greenhouse}</div>
              <div class="temp">${isNaN(temp) ? item.temp : temp.toFixed(1)}°C</div>
            </div>
          `;
        });

        status.textContent = 'Оновлено: ' + new Date().toLocaleTimeString('uk-UA');

      } catch (err) {
        status.textContent = 'Помилка завантаження даних';
        console.error(err);
      }
    }

    loadData();
    setInterval(loadData, 30000);
  </script>

</body>
</html>
