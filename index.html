<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Теплиці</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #101820;
      color: white;
      margin: 0;
      padding: 16px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      max-width: 800px;
      margin: 0 auto 25px auto;
    }

    .card {
      background: #1f2933;
      border-radius: 14px;
      padding: 18px;
      text-align: center;
      box-shadow: 0 0 10px #0006;
    }

    .num {
      font-size: 16px;
      opacity: 0.8;
    }

    .temp {
      font-size: 34px;
      font-weight: bold;
      margin-top: 8px;
    }

    .controls {
      max-width: 1000px;
      margin: 0 auto 12px auto;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .controls button {
      background: #1f2933;
      color: white;
      border: 1px solid #ffffff33;
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .controls button.active {
      background: #2f855a;
    }

    .chart-box {
      background: #1f2933;
      border-radius: 14px;
      padding: 14px;
      max-width: 1000px;
      margin: 0 auto;
      height: 420px;
    }

    .status {
      text-align: center;
      margin-top: 16px;
      opacity: 0.75;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <h1>Теплиці</h1>

  <div class="grid" id="greenhouses"></div>

  <div class="controls" id="chartControls"></div>

  <div class="chart-box">
    <canvas id="tempChart"></canvas>
  </div>

  <div class="status" id="status">Завантаження...</div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbz7E4kd4iFHySkV8BL8hvx7XT8oToAE6KN8ZORgV6IHtYHHpJ7A29mjXWi9T7JXqhnF2Q/exec';

    let tempChart = null;

    let chartSettings = JSON.parse(localStorage.getItem('chartSettings')) || {
      hours: 3,
      visible: {
        green1: true,
        green2: true,
        green3: true,
        green4: true,
        green5: true,
        green6: true
      }
    };

    function saveChartSettings() {
      localStorage.setItem('chartSettings', JSON.stringify(chartSettings));
    }

    function renderControls() {
      const controls = document.getElementById('chartControls');

      controls.innerHTML = `
        <button onclick="setHours(3)" class="${chartSettings.hours === 3 ? 'active' : ''}">3 год</button>
        <button onclick="setHours(6)" class="${chartSettings.hours === 6 ? 'active' : ''}">6 год</button>
        <button onclick="setHours(12)" class="${chartSettings.hours === 12 ? 'active' : ''}">12 год</button>

        <button onclick="toggleGreen('green1')" class="${chartSettings.visible.green1 ? 'active' : ''}">Т1</button>
        <button onclick="toggleGreen('green2')" class="${chartSettings.visible.green2 ? 'active' : ''}">Т2</button>
        <button onclick="toggleGreen('green3')" class="${chartSettings.visible.green3 ? 'active' : ''}">Т3</button>
        <button onclick="toggleGreen('green4')" class="${chartSettings.visible.green4 ? 'active' : ''}">Т4</button>
        <button onclick="toggleGreen('green5')" class="${chartSettings.visible.green5 ? 'active' : ''}">Т5</button>
        <button onclick="toggleGreen('green6')" class="${chartSettings.visible.green6 ? 'active' : ''}">Т6</button>
      `;
    }

    function setHours(h) {
      chartSettings.hours = h;
      saveChartSettings();
      renderControls();
      loadData();
    }

    function toggleGreen(id) {
      chartSettings.visible[id] = !chartSettings.visible[id];
      saveChartSettings();
      renderControls();
      loadData();
    }

    async function loadData() {
      const box = document.getElementById('greenhouses');
      const status = document.getElementById('status');

      try {
        const res = await fetch(API_URL + '?hours=' + chartSettings.hours);
        const data = await res.json();

        box.innerHTML = '';

        (data.current || []).forEach(item => {
          const temp = Number(String(item.temp).replace(',', '.'));

          box.innerHTML += `
            <div class="card">
              <div class="num">Теплиця ${item.greenhouse}</div>
              <div class="temp">${isNaN(temp) ? '--' : temp.toFixed(1)}°C</div>
            </div>
          `;
        });

        drawChart(data.chart || []);

        status.textContent = 'Оновлено: ' + new Date().toLocaleTimeString('uk-UA');

      } catch (err) {
        console.error(err);
        status.textContent = 'Помилка завантаження даних';
      }
    }

    function drawChart(chartData) {
      const labels = chartData.map(row => row.time);

      const datasets = [];

      for (let i = 1; i <= 6; i++) {
        const id = 'green' + i;

        if (!chartSettings.visible[id]) continue;

        datasets.push({
          label: 'Теплиця ' + i,
          data: chartData.map(row => {
            const v = row[id];

            if (v === '' || v === null || v === undefined) return null;

            const n = Number(String(v).replace(',', '.'));
            return isNaN(n) ? null : n;
          }),
          tension: 0.3,
          pointRadius: 0,
          borderWidth: 2
        });
      }

      const ctx = document.getElementById('tempChart').getContext('2d');

      if (tempChart) {
        tempChart.destroy();
      }

      tempChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: datasets
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            mode: 'index',
            intersect: false
          },
          plugins: {
            legend: {
              labels: {
                color: 'white'
              }
            },
            tooltip: {
              callbacks: {
                label: function(context) {
                  if (context.parsed.y === null) return context.dataset.label + ': --';
                  return context.dataset.label + ': ' + context.parsed.y + '°C';
                }
              }
            }
          },
          scales: {
            x: {
              ticks: {
                color: 'white',
                maxTicksLimit: 12
              },
              grid: {
                color: '#ffffff18'
              }
            },
            y: {
              ticks: {
                color: 'white',
                callback: value => value + '°C'
              },
              grid: {
                color: '#ffffff18'
              }
            }
          }
        }
      });
    }

    renderControls();
    loadData();
    setInterval(loadData, 30000);
  </script>

</body>
</html>
